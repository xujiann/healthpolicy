name: Daily policy update

on:
  schedule:
    # 01:30 Asia/Shanghai every day.
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-policies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch and apply new policy candidates
        run: node tools/update-policies.mjs --apply --max=8

      - name: Refresh assignment audit
        run: node tools/generate-assignment-audit.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add policy-supplement.js policy-update-log.json policy-assignment-audit.csv
          if git diff --cached --quiet; then
            echo "No policy updates."
          else
            git commit -m "Daily policy update"
            git push
          fi
